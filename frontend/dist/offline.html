<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>CODEBET - Offline</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      background: #0A0A0A;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    h1 {
      color: #FFD700;
      font-size: 2rem;
      margin-bottom: 1rem;

      color: black;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #FFD700/90;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CODEBET</h1>
    <p>You are currently offline. Please check your internet connection.</p>
    <button onclick="window.location.reload()">Retry</button>

</html>
